<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Projects</title>
<style>
    body{
        margin: 0;
        font-family: Arial, sans-serif;
        background: lightblue;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }
    .container{
        background: white;
        padding: 30px;
        border-radius: 20px;
        text-align: center;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 8px 20px gray;
    }
    h1{
        margin-bottom: 10px;
        color: darkblue;
    }
    h5{
        margin-bottom: 20px;
        color: dimgray;
    }
    ul{
        list-style: none;
        padding: 0;
    }
    li{
        margin: 12px 0;
    }
    a{
        display: block;
        padding: 14px;
        text-decoration: none;
        background: mediumseagreen;
        color: white;
        border-radius: 12px;
        font-weight: bold;
        transition: 0.3s;
    }
    a:hover{
        background: seagreen;
    }
    @media (max-width: 500px){
        .container{
            padding: 20px;
        }
        h1{
            font-size: 22px;
        }
        a{
            padding: 10px;
            font-size: 14px;
        }
    }
</style>
</head>

        <h1>My Mini Projects</h1>
